<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드론 항공 영상 — 수도권 제2순환선(양평-이천)</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #7a7a9a;
    }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(135deg,
        #dbeafe 0%, #c7d7fe 20%, #e0eaff 40%,
        #bfdbfe 60%, #a5c4f7 80%, #d4e4ff 100%
      );
      background-size: 300% 300%;
      animation: gradientShift 20s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      25%       { background-position: 50% 0%; }
      50%       { background-position: 100% 50%; }
      75%       { background-position: 50% 100%; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: -1;
      animation: orbFloat 18s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #93b8f7, #6b8cf0); top: -10%; left: -5%; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #a8c5f7, #7ba3e8); bottom: -8%; right: -5%; animation-delay: -7s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(20px, -30px) scale(1.05); }
    }

    /* ── Layout ── */
    .container {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Back button ── */
    .back-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.65);
      transform: translateX(-2px);
    }

    .back-btn svg {
      width: 14px; height: 14px;
      stroke: var(--text-secondary);
      stroke-width: 2.5;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      animation: fadeInUp 0.7s ease-out both;
    }

    .badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #0f1b4d, #1e40af, #3b5fc0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    /* ── Video wrapper ── */
    .video-wrap {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 16px 48px rgba(31, 38, 135, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.45);
      animation: fadeInUp 0.7s ease-out 0.15s both;
      aspect-ratio: 16 / 9;
    }

    .video-wrap iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    /* ── Footer ── */
    .footer {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .container { padding: 32px 16px 28px; gap: 20px; }
      .header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">

    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
      포탈로 돌아가기
    </a>

    <div class="header">
      <div class="badge">수도권 제2순환선(양평-이천) 건설공사</div>
      <h1>드론 항공 영상</h1>
      <p>'26년 1분기 촬영분</p>
    </div>

    <div class="video-wrap">
      <iframe width="560" height="315" src="https://www.youtube.com/embed/C_q1555Zr34?si=E0vDuwbjT210Jb8e" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

    <footer class="footer">
      <p>ⓒ한국도로공사 양평이천건설사업단. All rights reserved.</p>
    </footer>

  </div>

</body>
</html>
